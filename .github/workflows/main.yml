name: Build and Package Chrome Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies and build CSS
      run: |
        npm ci
        npm run build:css

    - name: Inject Supabase credentials and trial URL
      env:
        SUPABASE_URL_VAL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY_VAL: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        sed -i "s|const SUPABASE_URL = \"\";|const SUPABASE_URL = \"${SUPABASE_URL_VAL}\";|g" background.js
        sed -i "s|const SUPABASE_KEY = \"\";|const SUPABASE_KEY = \"${SUPABASE_KEY_VAL}\";|g" background.js
        sed -i "s|const TRIAL_FUNCTION_URL = \"\";|const TRIAL_FUNCTION_URL = \"${SUPABASE_URL_VAL}/functions/v1/analyze\";|g" background.js

    - name: Package Extension
      run: |
        zip -r extension.zip manifest.json background.js content.js content.css popup.html popup.js sidepanel.html sidepanel.js dashboard.html dashboard.js settings.html settings.js styles.css icons/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension
        path: extension.zip
