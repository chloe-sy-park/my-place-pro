name: Build and Package Chrome Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # .github/workflows/main.yml 수정본
    - name: Replace API Keys and Supabase Info
      run: |
        # Gemini API 키 주입
        sed -i "s/const apiKey = \"\";/const apiKey = \"${{ secrets.GEMINI_API_KEY }}\";/g" background.js
        sed -i "s/const apiKey = \"\";/const apiKey = \"${{ secrets.GEMINI_API_KEY }}\";/g" popup.js
        
        # Supabase 정보 주입
        sed -i "s/const SUPABASE_URL = \"\";/const SUPABASE_URL = \"${{ secrets.SUPABASE_URL }}\";/g" background.js
        sed -i "s/const SUPABASE_KEY = \"\";/const SUPABASE_KEY = \"${{ secrets.SUPABASE_ANON_KEY }}\";/g" background.js
    
    - name: Package Extension
      run: |
        zip -r extension.zip .
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension
        path: extension.zip
