name: Build and Package Chrome Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Replace API Key
      run: |
        # background.js와 popup.js 모두 키 주입
        sed -i "s/const apiKey = \"\";/const apiKey = \"${{ secrets.GEMINI_API_KEY }}\";/g" background.js
        sed -i "s/const apiKey = \"\";/const apiKey = \"${{ secrets.GEMINI_API_KEY }}\";/g" popup.js
    
    - name: Package Extension
      run: |
        zip -r extension.zip .
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension
        path: extension.zip
