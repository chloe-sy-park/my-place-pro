name: Build and Package Chrome Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Replace API Keys and Supabase Info
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL_VAL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY_VAL: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        sed -i "s|const apiKey = \"\";|const apiKey = \"${GEMINI_KEY}\";|g" background.js
        sed -i "s|const SUPABASE_URL = \"\";|const SUPABASE_URL = \"${SUPABASE_URL_VAL}\";|g" background.js
        sed -i "s|const SUPABASE_KEY = \"\";|const SUPABASE_KEY = \"${SUPABASE_KEY_VAL}\";|g" background.js

    - name: Package Extension
      run: |
        zip extension.zip manifest.json background.js content.js content.css popup.html popup.js dashboard.html dashboard.js INSTRUCTIONS.md

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension
        path: extension.zip
