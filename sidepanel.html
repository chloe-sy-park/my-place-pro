<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-slate-50 via-indigo-50/30 to-slate-100 h-screen flex flex-col font-sans">

  <!-- Header -->
  <header class="px-5 py-4 flex items-center justify-between border-b border-white/40 bg-white/60 backdrop-blur-xl shrink-0">
    <h1 class="text-lg font-black text-indigo-600 italic">JustDump</h1>
    <div class="flex items-center gap-3">
      <button id="open-dashboard" class="text-[10px] text-slate-400 hover:text-indigo-500 font-bold transition" title="Full dashboard">Dashboard</button>
      <button id="go-settings" class="text-slate-400 hover:text-indigo-500 transition" title="Settings">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Save Current Page -->
  <div id="save-section" class="px-5 py-4 border-b border-white/30 bg-white/40 backdrop-blur shrink-0">
    <div id="save-preview" class="hidden mb-3">
      <img id="preview-thumb" class="w-full h-32 object-cover rounded-xl border border-white/40">
    </div>
    <div class="mb-3">
      <p id="page-title" class="text-sm font-bold text-slate-700 line-clamp-2"></p>
      <p id="page-url" class="text-[10px] text-slate-400 mt-0.5 truncate"></p>
    </div>
    <div class="flex gap-2 mb-2">
      <select id="save-board" class="flex-1 bg-white/70 border border-white/40 rounded-lg px-3 py-2 text-xs text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>
    </div>
    <input id="note" class="w-full bg-white/70 border border-white/40 rounded-lg px-3 py-2 text-xs mb-2 focus:outline-none focus:ring-2 focus:ring-indigo-300" placeholder="Add a note (optional)...">
    <button id="save-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-xs transition">Save This Page</button>
    <p id="save-status" class="hidden text-center text-[10px] text-emerald-500 font-bold mt-1.5"></p>
  </div>

  <!-- Board Filter + Items -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="px-5 py-3 flex items-center justify-between shrink-0">
      <select id="board-filter" class="bg-transparent font-bold text-sm text-slate-700 focus:outline-none cursor-pointer"></select>
      <span id="item-count" class="text-[10px] text-slate-400"></span>
    </div>
    <div id="items-list" class="flex-1 overflow-y-auto px-5 pb-4 space-y-3"></div>
  </div>

  <!-- Footer -->
  <div class="px-5 py-3 border-t border-white/40 bg-white/40 backdrop-blur shrink-0">
    <button id="add-board" class="text-xs font-bold text-indigo-500 hover:text-indigo-700 transition">+ New Board</button>
  </div>

  <!-- Detail Overlay -->
  <div id="detail-overlay" class="hidden fixed inset-0 bg-gradient-to-br from-slate-50 via-indigo-50 to-slate-100 z-50 flex flex-col">
    <div class="px-5 py-4 flex items-center justify-between border-b border-white/40 bg-white/60 backdrop-blur-xl shrink-0">
      <button id="back-btn" class="text-sm text-slate-500 hover:text-indigo-600 font-bold transition">&larr; Back</button>
      <button id="delete-item" class="text-xs text-red-400 hover:text-red-600 font-bold transition">Delete</button>
    </div>
    <div class="flex-1 overflow-y-auto px-5 py-5 space-y-4">
      <div class="flex items-center gap-2 flex-wrap">
        <span id="d-cat" class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded uppercase"></span>
        <select id="d-board" class="text-[10px] bg-slate-100 border-none rounded px-2 py-0.5 focus:outline-none"></select>
      </div>
      <h2 id="d-title" class="text-lg font-bold leading-tight"></h2>
      <a id="d-url" class="text-[10px] text-indigo-500 hover:text-indigo-700 underline truncate block" target="_blank" rel="noopener"></a>
      <p id="d-sum" class="text-sm italic text-slate-600 border-l-4 border-indigo-500 pl-3"></p>
      <div id="d-tags" class="flex gap-1.5 flex-wrap"></div>
      <div id="d-content" class="bg-white/60 backdrop-blur p-3 rounded-xl text-xs leading-relaxed"></div>
      <!-- Threads -->
      <div class="border-t border-slate-200/60 pt-4">
        <h4 class="text-[10px] font-bold text-slate-400 mb-3 uppercase">Notes</h4>
        <div id="d-threads" class="space-y-2 mb-3"></div>
        <div class="flex gap-2">
          <input id="d-thread-input" class="flex-1 bg-white/70 border border-white/40 p-2.5 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-300" placeholder="Add a note...">
          <button id="d-thread-add" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 rounded-lg text-xs font-bold transition">Add</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
