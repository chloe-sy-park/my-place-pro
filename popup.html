<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="w-80 p-4 bg-gradient-to-br from-slate-50 via-indigo-50/30 to-slate-100">
  <div class="flex justify-between items-center mb-4">
    <h1 class="font-black text-indigo-600 text-lg">JustDump</h1>
    <button id="go-dashboard" class="text-xs font-bold text-slate-400 hover:text-indigo-500 underline transition">Boards</button>
  </div>

  <!-- YouTube Thumbnail Preview -->
  <div id="video-preview" class="hidden mb-3">
    <img id="thumb-img" class="w-full h-36 object-cover rounded-xl border border-white/40">
  </div>

  <!-- Page Info -->
  <div id="page-info" class="bg-white/70 backdrop-blur p-3 rounded-xl border border-white/40 mb-3">
    <p id="page-title" class="text-sm font-bold text-slate-700 line-clamp-2"></p>
    <p id="page-url" class="text-[10px] text-slate-400 mt-1 truncate"></p>
  </div>

  <!-- Save Form -->
  <div class="space-y-2">
    <select id="board-select" class="w-full bg-white/70 backdrop-blur border border-white/40 rounded-lg px-3 py-2 text-sm text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>
    <input id="note" class="w-full bg-white/70 backdrop-blur border border-white/40 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" placeholder="Add a note (optional)...">
    <button id="save-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg text-sm transition">Save This Page</button>
  </div>

  <!-- Status -->
  <p id="status" class="hidden text-center text-xs text-indigo-500 font-bold mt-2"></p>

  <!-- Tip -->
  <p class="text-[10px] text-slate-400 mt-3 text-center">Tip: Hover over images on any webpage, or Alt + hover over text to save.</p>

  <script src="popup.js"></script>
</body>
</html>
