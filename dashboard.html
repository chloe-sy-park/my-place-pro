<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <style>
    .board-active { background: #6366f1; color: white; }
    .filter-active { background: #eef2ff; color: #4f46e5; border-color: #c7d2fe; }
    .masonry { columns: 4; column-gap: 1.25rem; }
    .masonry > * { break-inside: avoid; margin-bottom: 1.25rem; }
    @media (max-width: 1024px) { .masonry { columns: 3; } }
    @media (max-width: 768px) { .masonry { columns: 2; } }
    @media (max-width: 480px) { .masonry { columns: 1; } }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-indigo-50/30 to-slate-100 h-screen flex flex-col overflow-hidden font-sans">

  <!-- Header -->
  <header class="px-8 py-5 border-b border-white/40 bg-white/60 backdrop-blur-xl shrink-0">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-black text-indigo-600 italic">JustDump</h1>
      <div class="flex items-center gap-3">
        <span id="item-count" class="text-xs text-slate-400"></span>
        <button id="go-settings" class="text-slate-400 hover:text-indigo-500 transition" title="Settings">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Search -->
    <div class="relative mb-4">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="search" class="w-full bg-white/80 border border-white/60 rounded-2xl pl-11 pr-4 py-3 text-sm text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white transition" placeholder="Search your dumps...">
    </div>
    <!-- Board Tabs -->
    <div class="flex items-center gap-2 mb-3 overflow-x-auto pb-1">
      <div id="board-tabs" class="flex items-center gap-1.5"></div>
      <button id="add-b" class="shrink-0 text-xs font-bold text-indigo-400 hover:text-indigo-600 bg-indigo-50/60 hover:bg-indigo-100 px-3 py-1.5 rounded-full transition">+ New</button>
    </div>
    <!-- Type Filters -->
    <div id="type-filters" class="flex items-center gap-1.5 overflow-x-auto pb-1"></div>
  </header>

  <!-- Main Grid -->
  <main class="flex-1 overflow-y-auto px-8 py-6">
    <div id="grid" class="masonry"></div>
    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-20">
      <p class="text-lg font-bold text-slate-300">No items found</p>
      <p class="text-sm text-slate-300 mt-1">Save a page to get started!</p>
    </div>
  </main>

  <!-- Detail Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-6">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden">
      <!-- Modal Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 shrink-0">
        <button id="close" class="text-slate-400 hover:text-slate-600 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
        <button id="delete-item" class="text-xs text-red-400 hover:text-red-600 font-bold transition">Delete</button>
      </div>
      <!-- Modal Body: Two-Panel -->
      <div class="flex-1 flex overflow-hidden min-h-0">
        <!-- Left: Content Preview -->
        <div id="m-content" class="w-3/5 overflow-y-auto p-6 bg-slate-50/50 border-r border-slate-100"></div>
        <!-- Right: Metadata Sidebar -->
        <div class="w-2/5 overflow-y-auto p-6 space-y-5">
          <h2 id="m-title" class="text-xl font-bold leading-tight"></h2>
          <div class="flex items-center gap-2 text-xs text-slate-400">
            <span id="m-date"></span>
            <span>&middot;</span>
            <span id="m-source" class="font-bold"></span>
          </div>
          <a id="m-url" class="text-xs text-indigo-500 hover:text-indigo-700 underline truncate block" target="_blank" rel="noopener"></a>
          <!-- Summary -->
          <div id="m-sum-wrap" class="bg-indigo-50/60 border border-indigo-100 rounded-xl p-4">
            <p class="text-[10px] font-bold text-indigo-400 uppercase mb-1">Summary</p>
            <p id="m-sum" class="text-sm text-slate-600 leading-relaxed"></p>
          </div>
          <!-- Note -->
          <div id="m-note-wrap" class="hidden bg-emerald-50/80 border border-emerald-100 rounded-xl p-4">
            <p class="text-[10px] font-bold text-emerald-600 uppercase mb-1">Note</p>
            <p id="m-note" class="text-sm text-slate-600 leading-relaxed"></p>
          </div>
          <!-- Tags -->
          <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Tags</p>
            <div id="m-tags" class="flex gap-1.5 flex-wrap"></div>
          </div>
          <!-- Board -->
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Board</span>
            <select id="m-board" class="text-xs bg-slate-100 border-none rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-300"></select>
          </div>
          <!-- Notes -->
          <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Notes</p>
            <div id="t-list" class="space-y-2 mb-3 max-h-40 overflow-y-auto"></div>
            <div class="flex gap-2">
              <input id="t-input" class="flex-1 bg-slate-100 border-none p-2.5 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-300" placeholder="Add a note...">
              <button id="t-add" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 rounded-lg text-xs font-bold transition">Add</button>
            </div>
          </div>
          <!-- Related -->
          <div id="m-related">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Related</p>
            <div id="r-list" class="space-y-2"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
